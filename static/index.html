<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jarvees</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand:        #6366f1;
      --brand-dark:   #4f46e5;
      --brand-light:  #e0e7ff;
      --bg:           #f1f5f9;
      --card:         #ffffff;
      --text:         #1e293b;
      --muted:        #64748b;
      --border:       #e2e8f0;
      --high:         #ef4444;
      --medium:       #f59e0b;
      --low:          #22c55e;
      --done-color:   #94a3b8;
      --shadow:       0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md:    0 4px 12px rgba(0,0,0,.09), 0 2px 4px rgba(0,0,0,.05);
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body { display: flex; flex-direction: column; overflow: hidden; }

    /* ── Header ─────────────────────────────────────────────────────────── */
    header {
      height: 58px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      flex-shrink: 0;
      box-shadow: var(--shadow);
      z-index: 20;
    }

    .logo {
      font-size: 19px;
      font-weight: 700;
      color: var(--brand);
      letter-spacing: -.4px;
    }
    .logo span {
      font-weight: 400;
      font-size: 12px;
      color: var(--muted);
      margin-left: 8px;
      letter-spacing: 0;
    }

    .header-actions { display: flex; gap: 8px; }

    .btn {
      padding: 6px 13px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 5px;
      transition: all .15s;
      font-family: inherit;
    }
    .btn:hover:not(:disabled) { background: var(--bg); color: var(--text); }
    .btn:disabled { opacity: .4; cursor: default; }
    .btn.active { border-color: var(--brand); color: var(--brand); background: var(--brand-light); }

    /* ── Main layout ─────────────────────────────────────────────────────── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 400px;
      overflow: hidden;
    }

    /* ── Task panel ──────────────────────────────────────────────────────── */
    .task-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid var(--border);
    }

    .panel-head {
      padding: 18px 24px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      background: var(--card);
    }

    .panel-title {
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .count-pill {
      background: var(--brand-light);
      color: var(--brand);
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 99px;
    }

    .task-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ── Task card ───────────────────────────────────────────────────────── */
    .task-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 16px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      box-shadow: var(--shadow);
      transition: box-shadow .18s, opacity .18s;
    }
    .task-card:hover { box-shadow: var(--shadow-md); }
    .task-card.done  { opacity: .58; }

    .task-num {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      min-width: 20px;
      text-align: right;
      padding-top: 3px;
      flex-shrink: 0;
      user-select: none;
    }

    .task-check {
      width: 17px;
      height: 17px;
      margin-top: 3px;
      flex-shrink: 0;
      cursor: pointer;
      accent-color: var(--brand);
    }

    .task-body { flex: 1; min-width: 0; }

    .task-title {
      font-size: 14px;
      font-weight: 500;
      line-height: 1.4;
      word-break: break-word;
      color: var(--text);
    }
    .done .task-title { text-decoration: line-through; color: var(--done-color); }

    .task-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 6px;
    }

    .badge {
      font-size: 11px;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 5px;
      display: inline-flex;
      align-items: center;
      gap: 3px;
    }
    .b-deadline  { background: #eff6ff; color: #3b82f6; }
    .b-duration  { background: #f8fafc; color: var(--muted); border: 1px solid var(--border); }
    .b-high      { background: #fef2f2; color: var(--high); }
    .b-medium    { background: #fffbeb; color: #b45309; }
    .b-low       { background: #f0fdf4; color: #15803d; }
    .b-recurring { background: #f5f3ff; color: #7c3aed; }

    /* ── Subtasks ────────────────────────────────────────────────────────── */
    .task-group { display: flex; flex-direction: column; gap: 4px; }

    .subtask-list {
      list-style: none;
      margin: 2px 0 0 36px;
      padding: 0 0 0 12px;
      border-left: 2px solid var(--brand-light);
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .subtask-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 8px;
      border-radius: 6px;
      transition: background .12s;
    }
    .subtask-item:hover { background: var(--bg); }

    .subtask-check {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      cursor: pointer;
      accent-color: var(--brand);
    }

    .subtask-title {
      font-size: 13px;
      color: var(--text);
      line-height: 1.4;
      flex: 1;
    }
    .subtask-item.subtask-done .subtask-title {
      text-decoration: line-through;
      color: var(--done-color);
    }

    .sub-dur {
      font-size: 11px;
      color: var(--muted);
      margin-left: 5px;
      font-weight: 400;
    }

    .progress-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 5px;
      background: var(--brand-light);
      color: var(--brand);
    }
    .progress-badge.all-done {
      background: #dcfce7;
      color: #15803d;
    }

    /* ── Empty state ─────────────────────────────────────────────────────── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--muted);
      padding: 40px;
      text-align: center;
    }
    .empty-icon { font-size: 38px; }
    .empty-state p { font-size: 14px; line-height: 1.6; max-width: 260px; }

    /* ── Chat panel ──────────────────────────────────────────────────────── */
    .chat-panel {
      display: flex;
      flex-direction: column;
      background: var(--card);
      overflow: hidden;
    }

    .chat-head {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .online-dot {
      width: 7px; height: 7px;
      background: #22c55e;
      border-radius: 50%;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg-wrap { display: flex; flex-direction: column; gap: 3px; }
    .msg-wrap.user   { align-items: flex-end; }
    .msg-wrap.jarvees{ align-items: flex-start; }

    .msg {
      max-width: 82%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 13.5px;
      line-height: 1.55;
      animation: fadeUp .2s ease;
    }
    .msg.jarvees {
      background: var(--bg);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }
    .msg.user {
      background: var(--brand);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg-time {
      font-size: 10px;
      color: var(--muted);
      padding: 0 4px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Typing indicator */
    .typing {
      display: inline-flex;
      gap: 4px;
      padding: 11px 14px;
      background: var(--bg);
      border-radius: 14px;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
    }
    .typing span {
      width: 6px; height: 6px;
      background: var(--muted);
      border-radius: 50%;
      animation: dot 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: .2s; }
    .typing span:nth-child(3) { animation-delay: .4s; }
    @keyframes dot {
      0%, 60%, 100% { transform: translateY(0); }
      30%           { transform: translateY(-5px); }
    }

    /* ── Chat input ──────────────────────────────────────────────────────── */
    .chat-input-row {
      padding: 14px 18px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    #chatInput {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 13.5px;
      font-family: inherit;
      color: var(--text);
      resize: none;
      outline: none;
      height: 42px;
      min-height: 42px;
      max-height: 110px;
      overflow-y: auto;
      transition: border-color .15s;
      line-height: 1.4;
    }
    #chatInput:focus  { border-color: var(--brand); }
    #chatInput::placeholder { color: #94a3b8; }

    #sendBtn {
      width: 42px; height: 42px;
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 17px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background .15s;
    }
    #sendBtn:hover:not(:disabled) { background: var(--brand-dark); }
    #sendBtn:disabled { opacity: .5; cursor: default; }

    /* ── Archive modal ───────────────────────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(15,23,42,.45);
      z-index: 50;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      opacity: 0; pointer-events: none;
      transition: opacity .2s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--card);
      border-radius: 16px;
      width: 100%; max-width: 580px;
      max-height: 78vh;
      display: flex; flex-direction: column;
      box-shadow: 0 24px 64px rgba(0,0,0,.18);
      transform: translateY(10px);
      transition: transform .22s;
    }
    .overlay.open .modal { transform: translateY(0); }

    .modal-head {
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .modal-head h2 { font-size: 15px; font-weight: 600; }
    .modal-close {
      background: none; border: none; font-size: 22px;
      color: var(--muted); cursor: pointer;
      border-radius: 6px; padding: 2px 6px; line-height: 1;
    }
    .modal-close:hover { background: var(--bg); }

    .modal-body {
      flex: 1; overflow-y: auto;
      padding: 14px 22px;
      display: flex; flex-direction: column; gap: 8px;
    }

    .arc-item {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .arc-item .arc-body { flex: 1; min-width: 0; }
    .arc-title {
      font-size: 13.5px;
      color: var(--done-color);
      text-decoration: line-through;
      word-break: break-word;
    }
    .arc-date { font-size: 11px; color: #94a3b8; margin-top: 2px; }

    .del-btn {
      background: none; border: none;
      color: #fca5a5; cursor: pointer;
      font-size: 15px; padding: 4px 6px;
      border-radius: 5px;
      transition: color .15s, background .15s;
      flex-shrink: 0;
    }
    .del-btn:hover { color: var(--high); background: #fef2f2; }

    .modal-empty {
      text-align: center; padding: 32px 0;
      color: var(--muted); font-size: 13.5px;
    }

    /* ── Chat history (server-side) ─────────────────────────────────────── */
    .history-divider {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      padding: 4px 0 8px;
      border-top: 1px solid var(--border);
      margin-top: 4px;
    }
    .history-divider:first-child { border-top: none; }

    .msg.history-msg { opacity: 0.65; }

    /* ── Model badge ─────────────────────────────────────────────────────── */
    .model-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 4px;
      display: inline-block;
      margin-top: 3px;
    }
    .model-claude  { background: #ede9fe; color: #6d28d9; }
    .model-gemini  { background: #fef9c3; color: #854d0e; }
    .model-system  { background: #f1f5f9; color: #64748b; }
    .model-error   { background: #fef2f2; color: #b91c1c; }

    /* ── Priority dropdown ───────────────────────────────────────────────── */
    .priority-badge { cursor: pointer; user-select: none; }
    .priority-badge:hover { opacity: 0.75; }

    .priority-menu {
      position: fixed;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow-md);
      z-index: 300;
      overflow: hidden;
      min-width: 88px;
    }
    .priority-menu button {
      display: flex;
      align-items: center;
      gap: 7px;
      width: 100%;
      padding: 7px 13px;
      border: none;
      background: none;
      font-size: 12.5px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      color: var(--text);
      text-align: left;
    }
    .priority-menu button:hover { background: var(--bg); }
    .priority-menu button.p-active { font-weight: 700; }
    .priority-menu .p-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .p-dot-high   { background: var(--high); }
    .p-dot-medium { background: #f59e0b; }
    .p-dot-low    { background: var(--low); }

    /* ── Drag handle ─────────────────────────────────────────────────────── */
    .drag-handle {
      color: var(--border);
      font-size: 15px;
      line-height: 1;
      flex-shrink: 0;
      cursor: grab;
      user-select: none;
      padding: 2px 1px 0;
      transition: color .12s;
    }
    .task-card:hover .drag-handle { color: #cbd5e1; }

    /* ── Drag and drop states ─────────────────────────────────────────────── */
    .task-group.dragging { opacity: 0.38; }
    .task-group.drag-before { border-top: 2px solid var(--brand); padding-top: 3px; border-radius: 10px; }
    .task-group.drag-after  { border-bottom: 2px solid var(--brand); padding-bottom: 3px; border-radius: 10px; }

    /* ── Typing indicator with model hint ───────────────────────────────── */
    .typing-wrap {
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-self: flex-start;
    }
    .typing-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 4px;
      font-size: 10px;
      color: var(--muted);
      font-weight: 500;
    }
    .typing-elapsed {
      font-variant-numeric: tabular-nums;
      font-weight: 400;
    }

    /* ── Cascade log note ────────────────────────────────────────────────── */
    .cascade-log-note {
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
      padding: 0 4px;
      line-height: 1.6;
      font-style: italic;
    }

    /* ── Confirm options ─────────────────────────────────────────────────── */
    .confirm-options {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 6px;
      max-width: 82%;
    }
    .confirm-btn {
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--brand);
      background: var(--brand-light);
      color: var(--brand);
      font-family: inherit;
      text-align: left;
      transition: all .15s;
    }
    .confirm-btn:hover:not(:disabled) { background: var(--brand); color: #fff; }
    .confirm-btn:disabled { opacity: .4; cursor: default; }

    /* ── Toast ───────────────────────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #1e293b; color: #fff;
      padding: 9px 18px; border-radius: 8px;
      font-size: 13px; font-weight: 500;
      opacity: 0; pointer-events: none;
      transition: opacity .2s;
      z-index: 100;
    }
    #toast.show { opacity: 1; }

    /* ── Mobile tabs (hidden on desktop) ────────────────────────────────── */
    .mobile-tabs { display: none; }

    @media (max-width: 640px) {
      /* Tab bar */
      .mobile-tabs {
        display: flex;
        background: var(--card);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        z-index: 10;
      }
      .mobile-tab {
        flex: 1;
        padding: 11px 8px;
        border: none;
        background: none;
        font-size: 14px;
        font-weight: 500;
        color: var(--muted);
        cursor: pointer;
        border-bottom: 3px solid transparent;
        transition: all .15s;
        font-family: inherit;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }
      .mobile-tab.active {
        color: var(--brand);
        border-bottom-color: var(--brand);
        background: var(--brand-light);
      }
      .mobile-tab-count {
        background: var(--brand);
        color: #fff;
        font-size: 10px;
        font-weight: 700;
        padding: 1px 6px;
        border-radius: 99px;
        min-width: 18px;
        text-align: center;
        display: inline-block;
      }
      .mobile-tab-count:empty { display: none; }

      /* Main layout: single column, panels toggled by JS */
      main {
        display: flex;
        flex-direction: column;
        grid-template-columns: unset;
      }
      .task-panel,
      .chat-panel {
        display: none;
        flex: 1;
        overflow: hidden;
        border-right: none;
      }
      .task-panel.mobile-active,
      .chat-panel.mobile-active {
        display: flex;
      }

      /* Compact header */
      header { padding: 0 14px; height: 50px; }
      .logo { font-size: 16px; }
      .logo span { display: none; }
      .btn { padding: 5px 9px; font-size: 12px; gap: 3px; }

      /* Task panel */
      .panel-head { padding: 12px 14px 10px; }
      .task-scroll { padding: 12px 14px; }

      /* Chat panel */
      .chat-head { padding: 11px 14px; }
      .chat-messages { padding: 12px 14px; }
      .chat-input-row {
        padding: 10px 14px;
        padding-bottom: max(10px, env(safe-area-inset-bottom));
      }

      /* Wider message bubbles on narrow screens */
      .msg { max-width: 92%; font-size: 13px; }
      .confirm-options { max-width: 92%; }

      /* Toast above home bar */
      #toast { bottom: max(20px, env(safe-area-inset-bottom, 20px)); }

      /* Archive modal slides up from bottom */
      .overlay { padding: 0; align-items: flex-end; }
      .modal { border-radius: 16px 16px 0 0; max-width: 100%; max-height: 85vh; }
    }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────────── -->
<header>
  <div class="logo">Jarvees <span>your personal AI assistant</span></div>
  <div class="header-actions">
    <button class="btn" id="undoBtn" onclick="doUndo()" disabled title="Undo last action (⌘Z)">
      ↩ Undo
    </button>
    <button class="btn" id="refreshClaudeBtn" onclick="refreshClaude()" style="display:none" title="Retry with better model">
      ↑ Retry with better model
    </button>
    <button class="btn" onclick="openArchive()">
      📦 Archived
    </button>
  </div>
</header>

<!-- ── Mobile tab bar (hidden on desktop via CSS) ──────────────────────────── -->
<nav class="mobile-tabs" id="mobileTabs">
  <button class="mobile-tab active" data-tab="chat" onclick="switchTab('chat')">
    💬 Chat
  </button>
  <button class="mobile-tab" data-tab="tasks" onclick="switchTab('tasks')">
    ✓ Tasks <span class="mobile-tab-count" id="mobileTaskCount"></span>
  </button>
</nav>

<!-- ── Main ────────────────────────────────────────────────────────────────── -->
<main>

  <!-- Task list -->
  <div class="task-panel">
    <div class="panel-head">
      <div class="panel-title">
        Your Tasks
        <span class="count-pill" id="taskCount">0</span>
      </div>
    </div>
    <div class="task-scroll" id="taskScroll">
      <!-- tasks rendered here -->
    </div>
  </div>

  <!-- Chat -->
  <div class="chat-panel">
    <div class="chat-head">
      <div class="online-dot"></div>
      Jarvees
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-row">
      <textarea id="chatInput" placeholder="Add a task, mark one done, ask anything…"></textarea>
      <button id="sendBtn" onclick="sendChat()" title="Send (Enter)">↑</button>
    </div>
  </div>

</main>

<!-- ── Archive modal ────────────────────────────────────────────────────────── -->
<div class="overlay" id="archiveOverlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-head">
      <h2>📦 Archived Tasks</h2>
      <button class="modal-close" onclick="closeArchive()">×</button>
    </div>
    <div class="modal-body" id="archiveBody"></div>
  </div>
</div>

<!-- ── Toast ────────────────────────────────────────────────────────────────── -->
<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════════════════════════════════════
let tasks = [];

// ═══════════════════════════════════════════════════════════════════════════════
// Chat history (server-side — persisted in SQLite via /api/chat/history)
// ─ Loaded once on page init from GET /api/chat/history.
// ─ Saved automatically by POST /api/chat for every AI-processed exchange.
// ─ Persists across browser sessions, server restarts, and preview reloads.
// ═══════════════════════════════════════════════════════════════════════════════

async function loadChatHistory() {
  try {
    const history = await api('/api/chat/history');
    if (!history.length) return;

    const box    = document.getElementById('chatMessages');
    const n      = history.length;
    // Top divider
    const top = document.createElement('div');
    top.className = 'history-divider';
    top.textContent = `— ${n} message${n !== 1 ? 's' : ''} from previous sessions —`;
    box.appendChild(top);

    // Render each saved message
    history.forEach(h => {
      const wrap = document.createElement('div');
      wrap.className = `msg-wrap ${h.role}`;

      // Convert SQLite UTC timestamp ("YYYY-MM-DD HH:MM:SS") to local time
      const time = h.timestamp
        ? new Date(h.timestamp.replace(' ', 'T') + 'Z')
            .toLocaleString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })
        : '';

      const badgeHtml = (h.role === 'jarvees' && h.model)
        ? `<span class="model-badge model-${modelCssClass(h.model)}">${MODEL_LABELS[h.model] || h.model}</span>`
        : '';

      wrap.innerHTML = `
        <div class="msg ${h.role} history-msg">${esc(h.text)}</div>
        ${badgeHtml}
        <span class="msg-time">${time}</span>`;
      box.appendChild(wrap);
    });

    // Bottom divider separating history from the new session
    const bot = document.createElement('div');
    bot.className = 'history-divider';
    bot.textContent = '— New session —';
    box.appendChild(bot);

    box.scrollTop = box.scrollHeight;
  } catch {
    // Server unreachable or empty history — silently continue
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// API helpers
// ═══════════════════════════════════════════════════════════════════════════════
async function api(path, opts = {}) {
  const res = await fetch(path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
  });
  if (!res.ok) {
    const body = await res.text();
    throw new Error(`${res.status}: ${body}`);
  }
  return res.json();
}

// ═══════════════════════════════════════════════════════════════════════════════
// Load & render tasks
// ═══════════════════════════════════════════════════════════════════════════════
async function loadTasks() {
  tasks = await api('/api/tasks');
  renderTasks();
  refreshUndoBtn();
}

function renderTasks() {
  const scroll = document.getElementById('taskScroll');
  const pill   = document.getElementById('taskCount');

  const active = tasks.filter(t => t.status === 'active').length;
  pill.textContent = active;
  // Update mobile tab badge
  const mobilePill = document.getElementById('mobileTaskCount');
  if (mobilePill) mobilePill.textContent = active > 0 ? active : '';

  if (tasks.length === 0) {
    scroll.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">✓</div>
        <p>Nothing on your list.<br>Tell Jarvees what you need to do in the chat →</p>
      </div>`;
    return;
  }

  // Build lookup: parent_id → [subtasks]
  const childMap = {};
  tasks.forEach(t => {
    if (t.parent_id) {
      if (!childMap[t.parent_id]) childMap[t.parent_id] = [];
      childMap[t.parent_id].push(t);
    }
  });

  // Only top-level tasks drive the numbered list order
  const topLevel = tasks.filter(t => !t.parent_id);

  // Flat ordered list for number assignment (parents + their children inline)
  const ordered = [];
  topLevel.forEach(t => {
    ordered.push(t);
    (childMap[t.id] || []).forEach(s => ordered.push(s));
  });

  const html = topLevel.map(t => {
    const n       = ordered.indexOf(t) + 1;
    const done    = t.status === 'completed';
    const subs    = childMap[t.id] || [];
    const subsDone = subs.filter(s => s.status === 'completed').length;
    const allDone  = subs.length > 0 && subsDone === subs.length;

    const progressBadge = subs.length > 0
      ? `<span class="progress-badge ${allDone ? 'all-done' : ''}">${subsDone}/${subs.length} done</span>`
      : '';

    const parentCard = `
      <div class="task-card ${done ? 'done' : ''}" data-id="${t.id}">
        <span class="drag-handle" title="Drag to reorder">⠿</span>
        <span class="task-num">${n}</span>
        <input type="checkbox" class="task-check" ${done ? 'checked' : ''}
          onchange="toggleTask(${t.id}, this.checked)" />
        <div class="task-body">
          <div class="task-title">${esc(t.title)}</div>
          <div class="task-meta">
            ${t.deadline           ? `<span class="badge b-deadline">📅 ${fmtDate(t.deadline)}</span>` : ''}
            ${t.estimated_duration ? `<span class="badge b-duration">⏱ ${t.estimated_duration}m</span>` : ''}
            ${t.priority           ? `<span class="badge b-${t.priority} priority-badge" onclick="openPriorityMenu(event,${t.id},'${t.priority}')">${t.priority}</span>` : ''}
            ${t.recurrence         ? `<span class="badge b-recurring">🔄 recurring</span>` : ''}
            ${progressBadge}
          </div>
        </div>
      </div>`;

    const subItems = subs.map(s => {
      const sdone = s.status === 'completed';
      const dur   = s.estimated_duration ? `<span class="sub-dur">⏱ ${s.estimated_duration}m</span>` : '';
      return `
        <li class="subtask-item ${sdone ? 'subtask-done' : ''}" data-id="${s.id}">
          <input type="checkbox" class="subtask-check" ${sdone ? 'checked' : ''}
            onchange="toggleTask(${s.id}, this.checked)" />
          <span class="subtask-title">${esc(s.title)}${dur}</span>
        </li>`;
    }).join('');

    return `
      <div class="task-group">
        ${parentCard}
        ${subs.length > 0 ? `<ul class="subtask-list">${subItems}</ul>` : ''}
      </div>`;
  }).join('');

  scroll.innerHTML = html;
  initDragDrop();
}

// ═══════════════════════════════════════════════════════════════════════════════
// Task actions (checkbox)
// ═══════════════════════════════════════════════════════════════════════════════
async function toggleTask(taskId, checked) {
  try {
    const ep = checked
      ? `/api/tasks/${taskId}/complete`
      : `/api/tasks/${taskId}/uncomplete`;
    await api(ep, { method: 'POST' });
    await loadTasks();
  } catch (e) {
    toast('Could not update task — try again.');
    await loadTasks(); // sync checkbox back
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// Undo
// ═══════════════════════════════════════════════════════════════════════════════
async function refreshUndoBtn() {
  const data = await api('/api/undo/available');
  document.getElementById('undoBtn').disabled = !data.available;
}

async function doUndo() {
  try {
    await api('/api/undo', { method: 'POST' });
    await loadTasks();
    addMsg('jarvees', 'Done — last action undone.', 'system');
    toast('Undone ↩');
  } catch {
    addMsg('jarvees', 'Nothing left to undo.', 'system');
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// Model helpers
// Maps any AI model ID → display label and CSS class.
// All Gemini variants (whatever comes back from the cascade) share the
// 'model-gemini' CSS class so they all get the same yellow styling.
// ═══════════════════════════════════════════════════════════════════════════════
const MODEL_LABELS = {
  claude:                                  '✦ Claude',
  'gemini-3.1-flash-lite-preview':         '✦ Gemini 3.1 Lite',
  'gemini-3-flash-preview':                '✦ Gemini 3',
  'gemini-2.5-pro':                        '✦ Gemini 2.5 Pro',
  'gemini-2.5-flash':                      '✦ Gemini 2.5',
  'gemini-2.5-flash-lite':                 '✦ Gemini 2.5 Lite',
  'gemini-2.5-flash-lite-preview-09-2025': '✦ Gemini 2.5 Lite Sep',
  'gemini-2.0-flash':                      '✦ Gemini 2.0',
  system:                                  'System',
  error:                                   '⚠ Error',
};

function modelCssClass(model) {
  if (!model) return 'system';
  // Named CSS classes only exist for these four — everything else (any Gemini
  // variant not yet in MODEL_LABELS) falls back to 'gemini'.
  if (model === 'claude' || model === 'system' || model === 'error') return model;
  return 'gemini';
}

// ═══════════════════════════════════════════════════════════════════════════════
// Frontend cascade state
// Mirrors the backend's _failed_models so we can show which model will be tried
// in the typing indicator before the response comes back.
// Updated from cascade_log on every response; cleared on model reset.
// ═══════════════════════════════════════════════════════════════════════════════
const FRONTEND_CASCADE = [
  'claude',
  'gemini-3.1-flash-lite-preview',
  'gemini-3-flash-preview',
  'gemini-2.5-pro',
  'gemini-2.5-flash',
  'gemini-2.5-flash-lite',
  'gemini-2.5-flash-lite-preview-09-2025',
  'gemini-2.0-flash',
];
let _frontendFailedModels = new Set();
let _pendingConfirmOptions = [];  // options from the last confirm action

function getNextExpectedModel() {
  return FRONTEND_CASCADE.find(m => !_frontendFailedModels.has(m)) || null;
}

function updateFailedModelsFromLog(cascadeLog) {
  if (!Array.isArray(cascadeLog)) return;
  cascadeLog.forEach(entry => {
    // Mark models that had a real failure (not just "skipped because already failed")
    if (entry.failed && entry.reason && entry.reason !== 'skipped') {
      _frontendFailedModels.add(entry.model);
    }
  });
}

function buildCascadeNote(cascadeLog) {
  if (!Array.isArray(cascadeLog)) return '';
  // Only include entries that actually ran (skip pre-skipped ones)
  const ran = cascadeLog.filter(e => e.reason !== 'skipped');
  if (ran.length <= 1 && !ran.some(e => e.failed)) return '';
  const parts = ran.map(e => {
    const label = MODEL_LABELS[e.model] || e.model;
    if (e.failed) return `${label} ✗ ${e.elapsed_s}s`;
    return `${label} ✓ ${e.elapsed_s}s`;
  });
  return `<div class="cascade-log-note">${parts.join(' → ')}</div>`;
}

// ═══════════════════════════════════════════════════════════════════════════════
// Chat
// ═══════════════════════════════════════════════════════════════════════════════
async function sendChat() {
  const input = document.getElementById('chatInput');
  const msg   = input.value.trim();
  if (!msg) return;

  input.value = '';
  input.style.height = '42px';
  document.getElementById('sendBtn').disabled = true;

  addMsg('user', msg);
  if (isMobile() && _activeTab !== 'chat') switchTab('chat');
  const typingId = addTyping();

  try {
    const result = await api('/api/chat', {
      method: 'POST',
      body: JSON.stringify({ message: msg }),
    });
    removeTyping(typingId);

    // Update frontend's failure map from what the server actually tried
    updateFailedModelsFromLog(result.cascade_log);

    if (result.action === 'confirm') {
      // AI is unsure — show labeled options for the user to pick
      addConfirmMsg(result.message, result.options || [], result.cascade_log);
    } else {
      addMsg('jarvees', result.message || 'Done.', result.model, result.cascade_log);
    }

    handleModelState(result.model);
    await loadTasks();
  } catch (e) {
    removeTyping(typingId);
    addMsg('jarvees', 'Something went wrong. Check the server is running and try again.', 'error');
  } finally {
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }
}

function addMsg(role, text, model, cascadeLog) {
  const box  = document.getElementById('chatMessages');
  const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const wrap = document.createElement('div');
  wrap.className = `msg-wrap ${role}`;

  // Model badge — shown below Jarvees messages only (not user messages)
  let badgeHtml = '';
  if (role === 'jarvees' && model) {
    const label = MODEL_LABELS[model] || model;
    badgeHtml = `<span class="model-badge model-${modelCssClass(model)}">${label}</span>`;
  }

  // Cascade log note — shown when multiple models were tried
  const cascadeHtml = (role === 'jarvees' && cascadeLog) ? buildCascadeNote(cascadeLog) : '';

  wrap.innerHTML = `
    <div class="msg ${role}">${esc(text)}</div>
    ${badgeHtml}
    ${cascadeHtml}
    <span class="msg-time">${time}</span>`;
  box.appendChild(wrap);
  box.scrollTop = box.scrollHeight;
}

function addConfirmMsg(message, options, cascadeLog) {
  const box  = document.getElementById('chatMessages');
  const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap jarvees';

  const cascadeHtml = buildCascadeNote(cascadeLog || []);
  const optionsHtml = options.map((opt, i) =>
    `<button class="confirm-btn" onclick="executeConfirm(${i})">${esc(opt.label)}</button>`
  ).join('');

  wrap.innerHTML = `
    <div class="msg jarvees">${esc(message)}</div>
    ${cascadeHtml}
    <div class="confirm-options">${optionsHtml}</div>
    <span class="msg-time">${time}</span>`;

  _pendingConfirmOptions = options;   // store for executeConfirm()
  box.appendChild(wrap);
  box.scrollTop = box.scrollHeight;
}

async function executeConfirm(idx) {
  const option = _pendingConfirmOptions[idx];
  if (!option) return;

  // Disable all confirm buttons to prevent double-click
  document.querySelectorAll('.confirm-btn').forEach(btn => btn.disabled = true);

  addMsg('user', option.label);
  const typingId = addTyping();

  try {
    const result = await api('/api/chat/confirm', {
      method: 'POST',
      body: JSON.stringify({ action: option.action }),
    });
    removeTyping(typingId);
    updateFailedModelsFromLog(result.cascade_log || []);
    addMsg('jarvees', result.message || 'Done.', result.model, result.cascade_log);
    handleModelState(result.model);
    await loadTasks();
  } catch (e) {
    removeTyping(typingId);
    addMsg('jarvees', 'Something went wrong. Please try again.', 'error');
  }
}

function addTyping() {
  const box = document.getElementById('chatMessages');
  const id  = 'typ-' + Date.now();
  const el  = document.createElement('div');
  el.id = id;
  el.className = 'typing-wrap';

  const expectedModel = getNextExpectedModel();
  const modelLabel = expectedModel ? (MODEL_LABELS[expectedModel] || expectedModel) : 'AI';

  el.innerHTML = `
    <div class="typing-meta">
      <span class="typing-model-label">${esc(modelLabel)}</span>
      <span class="typing-elapsed">0s</span>
    </div>
    <div class="typing"><span></span><span></span><span></span></div>`;

  box.appendChild(el);
  box.scrollTop = box.scrollHeight;

  // Tick elapsed time every second
  const startTime = Date.now();
  el._timerId = setInterval(() => {
    const elapsed = el.querySelector('.typing-elapsed');
    if (elapsed) elapsed.textContent = Math.round((Date.now() - startTime) / 1000) + 's';
  }, 1000);

  return id;
}

function removeTyping(id) {
  const el = document.getElementById(id);
  if (el) {
    if (el._timerId) clearInterval(el._timerId);
    el.remove();
  }
}

// ─── Model state ──────────────────────────────────────────────────────────────
// Tracks whether we are currently on Claude or the Gemini fallback.
// 'claude' = normal; 'gemini' = billing fallback is active.
let _currentModel = 'claude';

function handleModelState(model) {
  // Ignore transient labels that don't reflect AI model choice
  if (!model || model === 'system' || model === 'error') return;

  _currentModel = model;
  const btn = document.getElementById('refreshClaudeBtn');
  if (model !== 'claude') {
    btn.style.display = 'flex';   // show "Switch back to Claude" for any Gemini variant
  } else {
    btn.style.display = 'none';   // hide it — Claude is already active
  }
}

async function refreshClaude() {
  const btn = document.getElementById('refreshClaudeBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Resetting…';
  try {
    await api('/api/model/reset', { method: 'POST' });
    // Clear both server flags (via API) and frontend mirror
    _frontendFailedModels.clear();
    _currentModel = 'claude';
    btn.style.display = 'none';
    toast('↑ Reset — next message will try the best available model.');
    addMsg('jarvees',
      "I've reset the model fallback. Your next message will start from Claude again — if it's still unavailable I'll cascade down automatically.",
      'system');
  } catch {
    toast('Could not reach server. Is it running?');
    btn.disabled = false;
    btn.textContent = '↑ Retry with better model';
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// Drag and drop task reordering
// Only top-level task groups are draggable. Subtasks move with their parent.
// New order is persisted via POST /api/tasks/reorder immediately on drop.
// ═══════════════════════════════════════════════════════════════════════════════
let _dragSrcEl  = null;
let _dropBefore = true;  // insert before (true) or after (false) the target

function initDragDrop() {
  document.querySelectorAll('#taskScroll > .task-group').forEach(g => {
    g.setAttribute('draggable', 'true');
    g.addEventListener('dragstart', _onDragStart);
    g.addEventListener('dragover',  _onDragOver);
    g.addEventListener('dragleave', _onDragLeave);
    g.addEventListener('drop',      _onDrop);
    g.addEventListener('dragend',   _onDragEnd);
  });
}

function _clearDragIndicators() {
  document.querySelectorAll('.task-group.drag-before, .task-group.drag-after')
    .forEach(el => el.classList.remove('drag-before', 'drag-after'));
}

function _onDragStart(e) {
  _dragSrcEl = this;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', '');
  // Delay class so the drag ghost snapshot captures the original look
  setTimeout(() => this.classList.add('dragging'), 0);
}

function _onDragOver(e) {
  e.preventDefault();
  if (this === _dragSrcEl) return;
  e.dataTransfer.dropEffect = 'move';
  _clearDragIndicators();
  const rect = this.getBoundingClientRect();
  _dropBefore = e.clientY < rect.top + rect.height / 2;
  this.classList.add(_dropBefore ? 'drag-before' : 'drag-after');
}

function _onDragLeave(e) {
  if (!this.contains(e.relatedTarget)) {
    this.classList.remove('drag-before', 'drag-after');
  }
}

async function _onDrop(e) {
  e.preventDefault();
  e.stopPropagation();
  const target = this;
  _clearDragIndicators();
  if (!_dragSrcEl || _dragSrcEl === target) return;

  // Move in DOM immediately (optimistic update)
  const scroll = document.getElementById('taskScroll');
  if (_dropBefore) {
    scroll.insertBefore(_dragSrcEl, target);
  } else {
    scroll.insertBefore(_dragSrcEl, target.nextSibling);
  }

  // Collect new order of parent task IDs from current DOM
  const newOrder = [...scroll.querySelectorAll('.task-group')]
    .map(g => parseInt(g.querySelector('.task-card[data-id]').dataset.id));

  try {
    await api('/api/tasks/reorder', {
      method: 'POST',
      body: JSON.stringify({ order: newOrder }),
    });
    // Silently update in-memory tasks array so undo state stays correct
    tasks = await api('/api/tasks');
    refreshUndoBtn();
  } catch {
    toast('Could not save order — try again.');
    await loadTasks(); // revert to server state
  }
}

function _onDragEnd() {
  if (_dragSrcEl) _dragSrcEl.classList.remove('dragging');
  _clearDragIndicators();
  _dragSrcEl = null;
}

// ═══════════════════════════════════════════════════════════════════════════════
// Priority dropdown
// Click the priority badge on any task to open a floating menu.
// ═══════════════════════════════════════════════════════════════════════════════
let _priorityMenu = null;

function openPriorityMenu(e, taskId, currentPriority) {
  e.stopPropagation();
  closePriorityMenu();  // close any existing one first

  const menu = document.createElement('div');
  menu.className = 'priority-menu';
  menu.id = 'priorityMenu';

  ['high', 'medium', 'low'].forEach(p => {
    const btn = document.createElement('button');
    if (p === currentPriority) btn.classList.add('p-active');
    btn.innerHTML = `<span class="p-dot p-dot-${p}"></span>${p}`;
    btn.onclick = ev => { ev.stopPropagation(); setPriority(taskId, p); };
    menu.appendChild(btn);
  });

  // Position the menu directly below the clicked badge
  const rect = e.currentTarget.getBoundingClientRect();
  menu.style.top  = (rect.bottom + 4) + 'px';
  menu.style.left = rect.left + 'px';
  document.body.appendChild(menu);
  _priorityMenu = menu;
}

function closePriorityMenu() {
  if (_priorityMenu) { _priorityMenu.remove(); _priorityMenu = null; }
}

async function setPriority(taskId, priority) {
  closePriorityMenu();
  try {
    await api(`/api/tasks/${taskId}/priority`, {
      method: 'POST',
      body: JSON.stringify({ priority }),
    });
    await loadTasks();
    toast(`Priority set to ${priority}`);
  } catch {
    toast('Could not update priority — try again.');
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// Archive modal
// ═══════════════════════════════════════════════════════════════════════════════
async function openArchive() {
  const archived = await api('/api/tasks/archived');
  const body     = document.getElementById('archiveBody');

  if (archived.length === 0) {
    body.innerHTML = `<div class="modal-empty">No archived tasks yet.<br>Completed tasks move here after 7 days.</div>`;
  } else {
    body.innerHTML = archived.map(t => `
      <div class="arc-item" id="arc-${t.id}">
        <div class="arc-body">
          <div class="arc-title">${esc(t.title)}</div>
          <div class="arc-date">Completed ${fmtDate(t.completed_at ? t.completed_at.split('T')[0] : '')}</div>
        </div>
        <button class="del-btn" onclick="deleteArchived(${t.id})" title="Delete permanently">🗑</button>
      </div>`).join('');
  }

  document.getElementById('archiveOverlay').classList.add('open');
}

async function deleteArchived(taskId) {
  await api(`/api/tasks/${taskId}`, { method: 'DELETE' });
  const el = document.getElementById(`arc-${taskId}`);
  if (el) {
    el.style.opacity = '0';
    el.style.transition = 'opacity .2s';
    setTimeout(() => {
      el.remove();
      const body = document.getElementById('archiveBody');
      if (!body.querySelector('.arc-item')) {
        body.innerHTML = `<div class="modal-empty">All cleared.</div>`;
      }
    }, 200);
  }
  toast('Deleted permanently');
}

function closeArchive() {
  document.getElementById('archiveOverlay').classList.remove('open');
}

function overlayClick(e) {
  if (e.target === e.currentTarget) closeArchive();
}

// ═══════════════════════════════════════════════════════════════════════════════
// Toast
// ═══════════════════════════════════════════════════════════════════════════════
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ═══════════════════════════════════════════════════════════════════════════════
// Keyboard shortcuts
// ═══════════════════════════════════════════════════════════════════════════════
document.getElementById('chatInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendChat();
  }
});

// Auto-expand textarea
document.getElementById('chatInput').addEventListener('input', function () {
  this.style.height = '42px';
  this.style.height = Math.min(this.scrollHeight, 110) + 'px';
});

// ⌘Z / Ctrl+Z → undo (but not when typing in the chat)
document.addEventListener('keydown', e => {
  const inInput = ['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName);
  if ((e.metaKey || e.ctrlKey) && e.key === 'z' && !inInput) {
    e.preventDefault();
    doUndo();
  }
});

// Escape → close archive + priority menu
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeArchive(); closePriorityMenu(); }
});

// Click anywhere outside → close priority menu
document.addEventListener('click', () => closePriorityMenu());

// ═══════════════════════════════════════════════════════════════════════════════
// Utilities
// ═══════════════════════════════════════════════════════════════════════════════
function fmtDate(iso) {
  if (!iso) return '';
  try {
    const [y, m, d] = iso.split('-');
    return new Date(+y, +m - 1, +d).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  } catch { return iso; }
}

function esc(str) {
  return String(str ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ═══════════════════════════════════════════════════════════════════════════════
// Mobile tab switching
// ═══════════════════════════════════════════════════════════════════════════════
let _activeTab = 'chat';

function isMobile() { return window.innerWidth <= 640; }

function switchTab(tab) {
  _activeTab = tab;
  document.querySelector('.task-panel').classList.toggle('mobile-active', tab === 'tasks');
  document.querySelector('.chat-panel').classList.toggle('mobile-active', tab === 'chat');
  document.querySelectorAll('.mobile-tab').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === tab);
  });
  // Scroll chat to bottom when switching to it
  if (tab === 'chat') {
    const box = document.getElementById('chatMessages');
    box.scrollTop = box.scrollHeight;
  }
}

// On desktop resize from mobile: unhide both panels
window.addEventListener('resize', () => {
  if (!isMobile()) {
    document.querySelector('.task-panel').classList.remove('mobile-active');
    document.querySelector('.chat-panel').classList.remove('mobile-active');
  } else {
    switchTab(_activeTab);
  }
});

// ═══════════════════════════════════════════════════════════════════════════════
// 15-minute Claude auto-retry
// If we're on the Gemini fallback, silently reset the flag every 15 minutes
// so the next user message gets a fresh attempt at Claude.
// ═══════════════════════════════════════════════════════════════════════════════
setInterval(async () => {
  if (_frontendFailedModels.size === 0) return;   // nothing to reset

  try {
    await api('/api/model/reset', { method: 'POST' });
    // Clear both backend and frontend failure state.
    // The badge on the next real message will confirm which model actually ran.
    // If a model is still broken, the cascade_log from that response will re-populate
    // _frontendFailedModels and re-show the retry button via handleModelState().
    _frontendFailedModels.clear();
    _currentModel = 'claude';
    document.getElementById('refreshClaudeBtn').style.display = 'none';
    console.log('[Jarvees] 15-min auto-retry: model flags reset. Next message will try Claude.');
  } catch {
    // Server unreachable — silently skip this cycle.
  }
}, 15 * 60 * 1000);   // 15 minutes

// ═══════════════════════════════════════════════════════════════════════════════
// Init
// ═══════════════════════════════════════════════════════════════════════════════
(async () => {
  await loadTasks();
  await loadChatHistory();   // fetch and render previous messages from SQLite
  addMsg('jarvees', "Hey! I'm Jarvees. Tell me what needs to get done and I'll handle the rest. What's on your plate?", 'system');
  if (isMobile()) switchTab('chat');  // default to chat view on mobile
})();
</script>
